{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product – MealBasket</title>
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="page">

  <div class="dashboard-header">
   
    <a href="{% url 'vendor_dashboard' %}" class="btn-cancel"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
  </div>

  <form method="POST" enctype="multipart/form-data" class="form-card">
    {% csrf_token %}

    <div class="form-group">
      <label>Product Name *</label>
      <input type="text" name="name" value="{{ product.name }}" required>
    </div>

    <div class="form-group">
      <label>Category *</label>
      <select name="category" required>
        <option value="">Select category</option>
        {% for category in categories %}
          <option value="{{ category.id }}" {% if category.id == product.category.id %}selected{% endif %}>
            {{ category.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Description *</label>
      <input type="text" name="description" value="{{ product.description }}" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Price per Serving (Rs) *</label>
        <input type="number" name="price" value="{{ product.price }}" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Cook Time (minutes)</label>
        <input type="number" name="cook_time" value="{{ product.cook_time }}">
      </div>
    </div>

    <div class="form-group">
      <label>Calories per Serving</label>
      <input type="number" name="calories" value="{{ product.calories }}">
    </div>

    <div class="form-group">
      <label>Product Image</label>
      <input type="file" name="image" accept="image/*">
      {% if product.image %}
        <div style="margin-top:0.5rem;">
          <img src="{{ product.image.url }}" width="120" alt="{{ product.name }}">
        </div>
      {% endif %}
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
      <a href="{% url 'vendor_dashboard' %}" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
</body>
</html>
