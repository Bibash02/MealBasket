<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Failed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{
        font-family: 'DM Sans', sans-serif;;
        background:#f8f9fa;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }
    .card{
        background:#ffffff;
        padding:40px;
        border-radius:12px;
        box-shadow:0 10px 30px rgba(0,0,0,0.1);
        text-align:center;
        width:400px;
    }
    .fail-icon{
        font-size:60px;
        color:#dc3545;
    }
    h2{
        margin-top:15px;
        color:#dc3545;
    }
    p{
        color:#555;
        margin:10px 0;
    }
    .btn{
        display:inline-block;
        margin-top:20px;
        padding:10px 20px;
        background:#dc3545;
        color:#fff;
        text-decoration:none;
        border-radius:6px;
        transition:0.3s;
    }
    .btn:hover{
        background:#c82333;
    }
</style>
</head>
<body>

<div class="card">
    <div class="fail-icon">✖</div>
    <h2>Payment Failed</h2>

    <p><strong>Order ID:</strong> {{ order.id }}</p>
    <p>Unfortunately, your payment could not be processed.</p>

    <p>Please try again or choose another payment method.</p>

    <a href="{% url 'checkout' %}" class="btn">Try Again</a>
</div>

</body>
</html>
