{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Profile – MealBasket</title>
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  .main-content {
    margin-left: 260px; /* match sidebar width */
    padding: 2rem;
    min-height: 100vh;
    background: var(--cream);
  }

  .page-card {
    background: #fff;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.05);
    max-width: 700px;
    margin: auto;
  }

  h1 {
    margin-bottom: 1.5rem;
    font-size: 1.8rem;
    color: #333;
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  .form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 100px;
  }

  .form-actions {
    margin-top: 1.5rem;
  }

  .btn-save {
    padding: 0.7rem 1.5rem;
    background: #22c55e;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
  }

  .btn-save:hover {
    background: #16a34a;
  }

  .btn {
    padding: 0.7rem 1.5rem;
    background: #f3f4f6;
    color: #333;
    text-decoration: none;
    border-radius: 6px;
    margin-left: 0.5rem;
  }

  .btn:hover {
    background: #e5e7eb;
  }
</style>
</head>
<body>

<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
        <i class="fa-solid fa-basket-shopping"></i>
        <span>MealBasket</span>
    </div>
    <div class="sidebar-user">
      <div class="user-name">{{ profile.user.username }}</div>
      <div class="user-role">Customer</div>
    </div>
    <ul class="sidebar-nav">
      <li><a  href="{% url 'customer_dashboard' %}" class="active"><i class="fa-solid fa-utensils"></i> Browse Meals</a></li>
      <li><a onclick="showDashPanel('c-orders')"><i class="fa-solid fa-bag-shopping"></i> My Orders</a></li>
      <li><a onclick="openCart()"><i class="fa-solid fa-cart-shopping"></i> Cart <span id="cart-count-badge" style="background:var(--green);color:#fff;border-radius:50px;padding:2px 8px;font-size:0.75rem;margin-left:4px;">0</span></a></li>
      <li><a onclick="showDashPanel('c-profile')"><i class="fa-solid fa-user-circle"></i> Profile</a></li>
    </ul>
    <div class="sidebar-logout">
      <a href="{% url 'logout' %}"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
    </div>
  </aside>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="main-content">
    <div class="page-card">
      <h1>Update Profile</h1>

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label>Business Name</label>
          <input type="text" name="full_name" value="{{ vendor_profile.full_name }}">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" value="{{ request.user.email }}" disabled>
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea name="address">{{ vendor_profile.address }}</textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Update Profile</button>
          <a href="{% url 'customer_dashboard' %}" class="btn">Back to Dashboard</a>
        </div>

      </form>
    </div>
  </main>

</div>

</body>
</html>
